<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body style="background-color:#e8f5e9; font-family:Arial, sans-serif;">

    <div style="width:400px; margin:50px auto; background-color:white; padding:20px; border-radius:10px; box-shadow:0 0 10px gray;">

        <h2 style="text-align:center; color:green;">
            Student Registration Form
        </h2>

        <form>

            <label style="font-weight:bold;">First Name:</label><br>
            <input type="text" required
                   style="width:100%; padding:8px; border:1px solid green; border-radius:5px;"><br><br>

            <label style="font-weight:bold;">Last Name:</label><br>
            <input type="text" required
                   style="width:100%; padding:8px; border:1px solid green; border-radius:5px;"><br><br>

            <label style="font-weight:bold;">Email:</label><br>
            <input type="email" required
                   style="width:100%; padding:8px; border:1px solid green; border-radius:5px;"><br><br>

            <label style="font-weight:bold;">Gender:</label><br>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <br><br>

            <label style="font-weight:bold;">Course:</label><br>
            <select style="width:100%; padding:8px; border:1px solid green; border-radius:5px;">
                <option>Software Development</option>
                <option>Networking</option>
                <option>Multimedia</option>
            </select>
            <br><br>

            <input type="submit" value="Register"
                   style="width:100%; background-color:green; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;">

        </form>

    </div>

</body>
</html>
